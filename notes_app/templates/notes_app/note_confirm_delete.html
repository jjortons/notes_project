{% extends 'notes_app/base.html' %}
{% block content %}
<h1>Delete Note</h1>
<p>Are you sure you want to delete "{{ object.title }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirm</button>
    <a href="{% url 'note_detail' object.pk %}" class="btn btn-link">Cancel</a>
</form>
{% endblock %}
