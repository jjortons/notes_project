{% extends 'notes_app/base.html' %}
{% block content %}
<h1>My Notes</h1>
<a href="{% url 'note_create' %}" class="btn btn-primary mb-3">Add New Note</a>
<div class="row">
    {% for note in notes %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                {% if note.icon %}
                    <img src="{{ note.icon.url }}" alt="icon" class="mb-2"
                         style="height: 32px; width: 32px; object-fit: cover;">
                {% endif %}
                <h5 class="card-title">{{ note.title }}</h5>
                <p class="card-text">{{ note.content|truncatewords:20 }}</p>
                <small class="text-muted">{{ note.date_taken }}</small>
                <div class="mt-2">
                    <a href="{% url 'note_detail' note.pk %}" class="btn btn-sm btn-outline-primary">View</a>
                    <a href="{% url 'note_update' note.pk %}" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <a href="{% url 'note_delete' note.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <p>No notes yet. <a href="{% url 'note_create' %}">Create one!</a></p>
    {% endfor %}
</div>
{% endblock %}
