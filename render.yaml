services:
  - type: web
    name: notes-neon-render
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn notes_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: notes_project.settings
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DATABASE_URL
        value: ${NEON_DATABASE_URL}
