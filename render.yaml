services:
  - type: web
    name: notes-neon-render
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn notes_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: notes_project.settings
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_kAuqtjxBpZ09@ep-blue-dew-aip7vj7n-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require
